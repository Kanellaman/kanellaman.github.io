  long: >-
    I graduated with a B.Sc. in Computer Science from the National and Kapodistrian University
    of Athens and am currently pursuing an MSc in Information Systems Development and Security
    at the Athens University of Economics and Business. I work as a Cloud DevOps Engineer at
    Performance Technologies, focusing on Azure cloud infrastructure, Kubernetes, CI/CD
    pipelines, and observability. I am increasingly drawn to the security side of engineering —
    penetration testing, secure network design, and security-aware architecture. I practice
    on TryHackMe and CryptoHack as part of my coursework and personal learning.

