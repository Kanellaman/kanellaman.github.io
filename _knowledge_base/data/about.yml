bio:
  short: >-
    Cloud DevOps Engineer at Performance Technologies and MSc student in Information Security at
    AUEB. Operating Azure infrastructure, AKS clusters, CI/CD pipelines, and ELK observability,
    with a growing focus on security engineering and offensive security.
  long: >-
    I graduated with a B.Sc. in Computer Science from the National and Kapodistrian University of
    Athens and am currently pursuing an MSc in Information Systems Development and Security at AUEB.
    I work as a Cloud DevOps Engineer at Performance Technologies, operating Azure infrastructure,
    managing AKS clusters, building CI/CD pipelines, and configuring ELK-based observability. My
    background in Linux, systems programming, networking, and distributed systems gives me the
    engineering foundations I am now extending into security — penetration testing, vulnerability
    assessment, secure network design, and cryptography — through MSc coursework, TryHackMe, and
    CryptoHack.

